name: Compile CV PDF

on:
  push:
    paths:
      - 'data/cv_data.json'
      - 'templates/cv_template.tex.j2'
      - 'generator.py'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install LaTeX
      run: |
        sudo apt-get update
        sudo apt-get install -y texlive-latex-base texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended texlive-fonts-extra

    - name: Generate PDF
      run: |
        python generator.py

    - name: Commit and Push Compiled PDF
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add output/cv_output.pdf
        git commit -m "chore: auto-compile PDF [skip ci]" || echo "No changes to commit"
        git push origin main
